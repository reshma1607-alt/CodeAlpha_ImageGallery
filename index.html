<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frame &amp; Grain — Photography Gallery</title>
<style>
  :root {
    --pg-bg: #0e0e10;
    --pg-panel: #1c1c1f;
    --pg-ink: #f2f0eb;
    --pg-ink-dim: #a5a3a0;
    --pg-line: #2a2a2e;
    --pg-accent: #c9a24b;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--pg-bg);
    color: var(--pg-ink);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    margin: 0;
    padding: 28px 32px 80px 56px;
    position: relative;
    overflow-x: hidden;
  }

  /* Sprocket rail — signature element */
  .pg-rail {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    background: linear-gradient(180deg, #000 0%, #050506 100%);
    border-right: 1px solid var(--pg-line);
    z-index: 5;
  }
  .pg-sprocket { width: 6px; height: 9px; border-radius: 2px; background: #333338; }

  .pg-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--pg-line);
    flex-wrap: wrap;
  }
  .pg-masthead-eyebrow {
    display: block;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pg-accent);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .pg-masthead {
    font-family: Arial, "Arial Narrow", sans-serif;
    font-weight: 800;
    font-stretch: condensed;
    letter-spacing: -0.01em;
    font-size: clamp(32px, 5vw, 56px);
    line-height: 0.95;
    margin: 0;
  }
  .pg-masthead-sub { margin: 8px 0 0; color: var(--pg-ink-dim); font-size: 13.5px; }

  .pg-upload-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--pg-ink);
    color: #16161a;
    border: none;
    padding: 11px 18px;
    border-radius: 3px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .pg-upload-btn:hover { background: var(--pg-accent); transform: translateY(-1px); }
  .pg-upload-btn:focus-visible { outline: 2px solid var(--pg-accent); outline-offset: 2px; }

  .pg-tags {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 26px;
    flex-wrap: wrap;
  }
  .pg-tag {
    background: transparent;
    border: 1px solid var(--pg-line);
    color: var(--pg-ink-dim);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12.5px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .pg-tag:hover { border-color: var(--pg-ink-dim); color: var(--pg-ink); }
  .pg-tag.active { background: var(--pg-ink); color: #16161a; border-color: var(--pg-ink); font-weight: 600; }
  .pg-tag:focus-visible { outline: 2px solid var(--pg-accent); outline-offset: 2px; }
  .pg-tags-count {
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--pg-ink-dim);
    font-size: 12px;
    letter-spacing: 0.02em;
  }

  .pg-masonry { display: flex; gap: 14px; align-items: flex-start; }
  .pg-col { display: flex; flex-direction: column; gap: 14px; flex: 1; min-width: 0; }

  .pg-tile { margin: 0; cursor: pointer; outline: none; }
  .pg-tile-inner {
    position: relative;
    width: 100%;
    border-radius: 4px;
    overflow: hidden;
    background: var(--pg-panel);
  }
  .pg-tile:focus-visible .pg-tile-inner { outline: 2px solid var(--pg-accent); outline-offset: 2px; }

  .pg-skeleton {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, #1c1c1f 8%, #232327 18%, #1c1c1f 33%);
    background-size: 200% 100%;
    animation: pg-shimmer 1.4s ease-in-out infinite;
  }
  @keyframes pg-shimmer { to { background-position-x: -200%; } }

  .pg-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .pg-img.loaded { opacity: 1; }
  .pg-tile:hover .pg-img { transform: scale(1.035); }

  .pg-overlay {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 14px;
    background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.78) 100%);
    opacity: 0;
    transition: opacity 0.25s ease;
    color: var(--pg-ink);
  }
  .pg-tile:hover .pg-overlay, .pg-tile:focus-visible .pg-overlay { opacity: 1; }
  .pg-overlay-icon { position: absolute; top: 12px; right: 12px; opacity: 0.85; }
  .pg-overlay-text { display: flex; flex-direction: column; gap: 2px; }
  .pg-overlay-title { font-size: 13.5px; font-weight: 600; }
  .pg-overlay-tag { font-size: 11px; color: var(--pg-accent); letter-spacing: 0.03em; text-transform: uppercase; }

  .pg-empty { text-align: center; padding: 100px 20px; color: var(--pg-ink-dim); display: none; }
  .pg-empty p { font-size: 16px; color: var(--pg-ink); margin: 0 0 8px; }
  .pg-empty span { font-size: 13px; }

  .pg-dropzone {
    position: fixed; inset: 0;
    background: rgba(14,14,16,0.88);
    backdrop-filter: blur(2px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 40;
    pointer-events: none;
    animation: pg-fade-in 0.15s ease;
  }
  .pg-dropzone.active { display: flex; }
  .pg-dropzone-inner {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 48px 64px;
    border: 1.5px dashed var(--pg-accent);
    border-radius: 8px;
    color: var(--pg-accent);
    font-size: 15px;
    letter-spacing: 0.02em;
  }

  .pg-lightbox {
    position: fixed; inset: 0;
    background: rgba(6,6,7,0.97);
    z-index: 50;
    display: none;
    flex-direction: column;
    animation: pg-fade-in 0.18s ease;
  }
  .pg-lightbox.open { display: flex; }
  @keyframes pg-fade-in { from { opacity: 0; } to { opacity: 1; } }

  .pg-lightbox-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px;
    color: var(--pg-ink-dim);
    font-size: 12.5px;
    letter-spacing: 0.05em;
  }
  .pg-lightbox-actions { display: flex; gap: 6px; }
  .pg-icon-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--pg-line);
    background: transparent;
    color: var(--pg-ink);
    cursor: pointer;
    transition: all 0.15s ease;
    text-decoration: none;
  }
  .pg-icon-btn:hover { background: var(--pg-panel); border-color: var(--pg-ink-dim); }
  .pg-icon-btn:focus-visible { outline: 2px solid var(--pg-accent); outline-offset: 2px; }

  .pg-lightbox-stage {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 90px 24px;
    min-height: 0;
    position: relative;
  }
  .pg-lightbox-img {
    max-width: 100%; max-height: 74vh;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    animation: pg-scale-in 0.22s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes pg-scale-in { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  .pg-lightbox-caption { margin-top: 16px; display: flex; align-items: center; gap: 10px; }
  .pg-lightbox-title { font-size: 14px; font-weight: 600; }
  .pg-lightbox-tag {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--pg-accent);
    border: 1px solid var(--pg-line);
    padding: 3px 8px; border-radius: 20px;
  }

  .pg-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: transparent; border: none; color: var(--pg-ink-dim);
    cursor: pointer; padding: 14px;
    transition: color 0.15s ease;
  }
  .pg-nav:hover { color: var(--pg-ink); }
  .pg-nav:focus-visible { outline: 2px solid var(--pg-accent); outline-offset: 2px; }
  .pg-nav-left { left: 10px; }
  .pg-nav-right { right: 10px; }
  .pg-nav svg, .pg-icon-btn svg, .pg-overlay-icon svg, .pg-upload-btn svg { display: block; }

  @media (prefers-reduced-motion: reduce) {
    .pg-img, .pg-overlay, .pg-skeleton, .pg-lightbox-img, .pg-upload-btn { animation: none !important; transition: none !important; }
  }

  @media (max-width: 640px) {
    body { padding: 20px 16px 60px 34px; }
    .pg-rail { width: 12px; }
    .pg-lightbox-stage { padding: 0 20px 20px; }
    .pg-nav { padding: 8px; }
  }
</style>
</head>
<body>

  <div class="pg-rail" id="pgRail" aria-hidden="true"></div>

  <header class="pg-header">
    <div class="pg-header-left">
      <span class="pg-masthead-eyebrow">Roll No. 004</span>
      <h1 class="pg-masthead">FRAME&nbsp;&amp;&nbsp;GRAIN</h1>
      <p class="pg-masthead-sub"><span id="photoCount">0</span> exposures — a working archive</p>
    </div>
    <button class="pg-upload-btn" id="uploadBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Add photos
    </button>
    <input type="file" id="fileInput" accept="image/*" multiple hidden />
  </header>

  <nav class="pg-tags" id="tagNav"></nav>

  <div class="pg-empty" id="emptyState">
    <p>No exposures tagged in this filter yet.</p>
    <span>Drag images anywhere on this page to develop them into the roll.</span>
  </div>

  <div class="pg-masonry" id="masonry"></div>

  <div class="pg-dropzone" id="dropzone">
    <div class="pg-dropzone-inner">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Drop to develop</span>
    </div>
  </div>

  <div class="pg-lightbox" id="lightbox">
    <div class="pg-lightbox-top">
      <span class="pg-lightbox-count" id="lbCount">01 / 12</span>
      <div class="pg-lightbox-actions">
        <a class="pg-icon-btn" id="lbDownload" download title="Download" aria-label="Download">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </a>
        <button class="pg-icon-btn" id="lbDelete" title="Delete" aria-label="Delete" style="display:none;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
        <button class="pg-icon-btn" id="lbClose" title="Close" aria-label="Close">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <button class="pg-nav pg-nav-left" id="lbPrev" aria-label="Previous">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div class="pg-lightbox-stage">
      <img class="pg-lightbox-img" id="lbImg" src="" alt="" />
      <div class="pg-lightbox-caption">
        <span class="pg-lightbox-title" id="lbTitle"></span>
        <span class="pg-lightbox-tag" id="lbTag"></span>
      </div>
    </div>

    <button class="pg-nav pg-nav-right" id="lbNext" aria-label="Next">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

<script>
(function () {
  "use strict";

  // -------------------------------------------------------------------
  // Seed data — placeholder photography set, varied aspect ratios on purpose
  // -------------------------------------------------------------------
  const SEED_PHOTOS = [
    { id: "s1", src: "https://images.unsplash.com/photo-1502790671504-542ad42d5189?w=800&q=80", w: 800, h: 1200, title: "Ridge Line", tag: "Landscape" },
    { id: "s2", src: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800&q=80", w: 800, h: 533, title: "Yellowstone Falls", tag: "Landscape" },
    { id: "s3", src: "https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=800&q=80", w: 800, h: 1000, title: "Portrait Study I", tag: "Portrait" },
    { id: "s4", src: "https://images.unsplash.com/photo-1519125323398-675f0ddb6308?w=800&q=80", w: 800, h: 1067, title: "Night Streets", tag: "Street" },
    { id: "s5", src: "https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=800&q=80", w: 800, h: 533, title: "Fog Break", tag: "Landscape" },
    { id: "s6", src: "https://images.unsplash.com/photo-1487958449943-2429e8be8625?w=800&q=80", w: 800, h: 1200, title: "Coastal Light", tag: "Landscape" },
    { id: "s7", src: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=800&q=80", w: 800, h: 600, title: "Market Hands", tag: "Street" },
    { id: "s8", src: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=800&q=80", w: 800, h: 1067, title: "Portrait Study II", tag: "Portrait" },
    { id: "s9", src: "https://images.unsplash.com/photo-1500534623283-312aade485b7?w=800&q=80", w: 800, h: 533, title: "Peaks at Dusk", tag: "Landscape" },
    { id: "s10", src: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80", w: 800, h: 1067, title: "Forest Floor", tag: "Nature" },
    { id: "s11", src: "https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=800&q=80", w: 800, h: 1200, title: "Empty Platform", tag: "Street" },
    { id: "s12", src: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800&q=80", w: 800, h: 1200, title: "Alpine Silence", tag: "Landscape" },
  ];

  const TAGS = ["All", "Landscape", "Portrait", "Street", "Nature", "Uploaded"];

  // -------------------------------------------------------------------
  // State
  // -------------------------------------------------------------------
  let photos = SEED_PHOTOS.slice();
  let activeTag = "All";
  let filtered = photos.slice();
  let lightboxIndex = null;
  let dragCounter = 0;
  let colCount = 4;

  // -------------------------------------------------------------------
  // DOM refs
  // -------------------------------------------------------------------
  const masonryEl = document.getElementById("masonry");
  const tagNavEl = document.getElementById("tagNav");
  const emptyStateEl = document.getElementById("emptyState");
  const photoCountEl = document.getElementById("photoCount");
  const dropzoneEl = document.getElementById("dropzone");
  const railEl = document.getElementById("pgRail");
  const fileInput = document.getElementById("fileInput");
  const uploadBtn = document.getElementById("uploadBtn");

  const lightboxEl = document.getElementById("lightbox");
  const lbImg = document.getElementById("lbImg");
  const lbTitle = document.getElementById("lbTitle");
  const lbTag = document.getElementById("lbTag");
  const lbCount = document.getElementById("lbCount");
  const lbDownload = document.getElementById("lbDownload");
  const lbDelete = document.getElementById("lbDelete");
  const lbClose = document.getElementById("lbClose");
  const lbPrev = document.getElementById("lbPrev");
  const lbNext = document.getElementById("lbNext");

  // -------------------------------------------------------------------
  // Sprocket rail
  // -------------------------------------------------------------------
  for (let i = 0; i < 40; i++) {
    const s = document.createElement("span");
    s.className = "pg-sprocket";
    railEl.appendChild(s);
  }

  // -------------------------------------------------------------------
  // Tag nav
  // -------------------------------------------------------------------
  function renderTags() {
    tagNavEl.innerHTML = "";
    TAGS.forEach((tag) => {
      const btn = document.createElement("button");
      btn.className = "pg-tag" + (tag === activeTag ? " active" : "");
      btn.textContent = tag;
      btn.addEventListener("click", () => {
        activeTag = tag;
        applyFilter();
      });
      tagNavEl.appendChild(btn);
    });
    const count = document.createElement("span");
    count.className = "pg-tags-count";
    count.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> ' + filtered.length;
    tagNavEl.appendChild(count);
  }

  // -------------------------------------------------------------------
  // Column count by viewport
  // -------------------------------------------------------------------
  function calcColumnCount() {
    const w = window.innerWidth;
    if (w < 560) return 1;
    if (w < 860) return 2;
    if (w < 1180) return 3;
    return 4;
  }

  // -------------------------------------------------------------------
  // Masonry distribution — shortest column first
  // -------------------------------------------------------------------
  function distributeColumns(list, cols) {
    const columns = Array.from({ length: cols }, () => []);
    const heights = Array(cols).fill(0);
    list.forEach((photo, i) => {
      let shortest = 0;
      for (let c = 1; c < cols; c++) if (heights[c] < heights[shortest]) shortest = c;
      columns[shortest].push({ photo, index: i });
      heights[shortest] += photo.h / photo.w;
    });
    return columns;
  }

  // -------------------------------------------------------------------
  // Lazy loading via IntersectionObserver
  // -------------------------------------------------------------------
  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          const wrap = entry.target;
          const img = wrap.querySelector("img[data-src]");
          if (img) {
            img.src = img.dataset.src;
            img.addEventListener("load", () => {
              img.classList.add("loaded");
              const skel = wrap.querySelector(".pg-skeleton");
              if (skel) skel.remove();
            }, { once: true });
            img.removeAttribute("data-src");
          }
          observer.unobserve(wrap);
        }
      });
    },
    { rootMargin: "200px" }
  );

  // -------------------------------------------------------------------
  // Render masonry grid
  // -------------------------------------------------------------------
  function renderMasonry() {
    masonryEl.innerHTML = "";
    photoCountEl.textContent = photos.length;

    if (filtered.length === 0) {
      emptyStateEl.style.display = "block";
      masonryEl.style.display = "none";
      return;
    }
    emptyStateEl.style.display = "none";
    masonryEl.style.display = "flex";

    const columns = distributeColumns(filtered, colCount);

    columns.forEach((col) => {
      const colEl = document.createElement("div");
      colEl.className = "pg-col";
      col.forEach(({ photo, index }) => {
        colEl.appendChild(buildTile(photo, index));
      });
      masonryEl.appendChild(colEl);
    });
  }

  function buildTile(photo, index) {
    const fig = document.createElement("figure");
    fig.className = "pg-tile";
    fig.tabIndex = 0;
    fig.setAttribute("role", "button");
    fig.setAttribute("aria-label", "Open " + photo.title);

    const inner = document.createElement("div");
    inner.className = "pg-tile-inner";
    inner.style.aspectRatio = photo.w + " / " + photo.h;

    const skeleton = document.createElement("div");
    skeleton.className = "pg-skeleton";
    inner.appendChild(skeleton);

    const img = document.createElement("img");
    img.className = "pg-img";
    img.alt = photo.title;
    img.loading = "lazy";
    img.draggable = false;
    img.dataset.src = photo.src;
    inner.appendChild(img);

    const overlay = document.createElement("div");
    overlay.className = "pg-overlay";
    overlay.innerHTML =
      '<svg class="pg-overlay-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>' +
      '<div class="pg-overlay-text"><span class="pg-overlay-title">' + escapeHtml(photo.title) + '</span>' +
      '<span class="pg-overlay-tag">' + escapeHtml(photo.tag) + '</span></div>';
    inner.appendChild(overlay);

    fig.appendChild(inner);

    fig.addEventListener("click", () => openLightbox(index));
    fig.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openLightbox(index);
      }
    });

    observer.observe(inner);
    return fig;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // -------------------------------------------------------------------
  // Filtering
  // -------------------------------------------------------------------
  function applyFilter() {
    filtered = activeTag === "All" ? photos.slice() : photos.filter((p) => p.tag === activeTag);
    renderTags();
    renderMasonry();
  }

  // -------------------------------------------------------------------
  // Lightbox
  // -------------------------------------------------------------------
  function openLightbox(index) {
    lightboxIndex = index;
    updateLightbox();
    lightboxEl.classList.add("open");
  }

  function closeLightbox() {
    lightboxEl.classList.remove("open");
    lightboxIndex = null;
  }

  function navigate(dir) {
    if (lightboxIndex === null) return;
    lightboxIndex = (lightboxIndex + dir + filtered.length) % filtered.length;
    updateLightbox();
  }

  function updateLightbox() {
    const photo = filtered[lightboxIndex];
    if (!photo) return;
    lbImg.src = photo.src;
    lbImg.alt = photo.title;
    lbTitle.textContent = photo.title;
    lbTag.textContent = photo.tag;
    lbCount.textContent = String(lightboxIndex + 1).padStart(2, "0") + " / " + String(filtered.length).padStart(2, "0");
    lbDownload.href = photo.src;
    lbDownload.download = photo.title.replace(/\s+/g, "-").toLowerCase() + ".jpg";
    lbDelete.style.display = photo.isUpload ? "inline-flex" : "none";
    lbDelete.onclick = () => deletePhoto(photo.id);
  }

  lbClose.addEventListener("click", closeLightbox);
  lbPrev.addEventListener("click", (e) => { e.stopPropagation(); navigate(-1); });
  lbNext.addEventListener("click", (e) => { e.stopPropagation(); navigate(1); });
  lightboxEl.addEventListener("click", (e) => {
    if (e.target === lightboxEl) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if (!lightboxEl.classList.contains("open")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowRight") navigate(1);
    if (e.key === "ArrowLeft") navigate(-1);
  });

  // -------------------------------------------------------------------
  // Upload (file picker + drag & drop)
  // -------------------------------------------------------------------
  function handleFiles(fileList) {
    const files = Array.from(fileList).filter((f) => f.type.startsWith("image/"));
    files.forEach((file) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        photos.unshift({
          id: "u-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7),
          src: url,
          w: img.naturalWidth,
          h: img.naturalHeight,
          title: file.name.replace(/\.[^/.]+$/, ""),
          tag: "Uploaded",
          isUpload: true,
        });
        applyFilter();
      };
      img.src = url;
    });
  }

  function deletePhoto(id) {
    photos = photos.filter((p) => p.id !== id);
    closeLightbox();
    applyFilter();
  }

  uploadBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => {
    if (e.target.files && e.target.files.length) handleFiles(e.target.files);
    fileInput.value = "";
  });

  document.body.addEventListener("dragenter", (e) => {
    e.preventDefault();
    dragCounter++;
    dropzoneEl.classList.add("active");
  });
  document.body.addEventListener("dragleave", (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      dropzoneEl.classList.remove("active");
    }
  });
  document.body.addEventListener("dragover", (e) => e.preventDefault());
  document.body.addEventListener("drop", (e) => {
    e.preventDefault();
    dragCounter = 0;
    dropzoneEl.classList.remove("active");
    if (e.dataTransfer.files && e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
  });

  // -------------------------------------------------------------------
  // Responsive column recalculation
  // -------------------------------------------------------------------
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const next = calcColumnCount();
      if (next !== colCount) {
        colCount = next;
        renderMasonry();
      }
    }, 120);
  });

  // -------------------------------------------------------------------
  // Init
  // -------------------------------------------------------------------
  colCount = calcColumnCount();
  renderTags();
  renderMasonry();
})();
</script>
</body>
